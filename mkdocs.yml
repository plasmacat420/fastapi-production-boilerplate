site_name: FastAPI Production Boilerplate
site_description: Production-ready FastAPI starter with JWT auth, RBAC, async DB, background workers
site_url: https://plasmacat420.github.io/fastapi-production-boilerplate
repo_url: https://github.com/plasmacat420/fastapi-production-boilerplate
repo_name: plasmacat420/fastapi-production-boilerplate

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Deployment: deployment.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables
